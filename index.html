<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Axona-share</title>
<style>
  :root { font-family: system-ui, sans-serif; --bg:#fff; --line:#e2e2e2; --accent:#2563eb; }
  * { box-sizing: border-box; }
  body { margin: 0; height: 100vh; display: flex; flex-direction: column; color: #222; }
  /* top bar */
  header { display: flex; align-items: center; gap: .6rem; padding: .5rem .8rem; border-bottom: 1px solid var(--line); }
  header h1 { font-size: 1.05rem; margin: 0; }
  #menuBtn { display: none; font-size: 1.2rem; background: none; border: 1px solid var(--line); border-radius: 6px; padding: .2rem .55rem; cursor: pointer; }
  #activeName { font-weight: 600; }
  #status { margin-left: auto; color: #06c; font-size: .82rem; }
  #ver { color: #777; font-size: .75rem; font-family: ui-monospace, monospace; }
  .badge { background: var(--accent); color: #fff; font-size: .7rem; line-height: 1.1rem; border-radius: 10px; padding: 0 .45rem; min-width: 1.1rem; text-align: center; }
  /* body split */
  .wrap { flex: 1; display: flex; min-height: 0; }
  #sidebar { width: 250px; border-right: 1px solid var(--line); display: flex; flex-direction: column; background: #fafafa; }
  .side-head { display: flex; align-items: center; justify-content: space-between; padding: .6rem .8rem; border-bottom: 1px solid var(--line); font-weight: 600; }
  #addChannel { font-size: 1.2rem; line-height: 1; border: 1px solid var(--line); background: #fff; border-radius: 6px; padding: 0 .5rem; cursor: pointer; }
  #channels { overflow-y: auto; flex: 1; }
  .chan { display: flex; align-items: center; gap: .4rem; padding: .55rem .8rem; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
  .chan:hover { background: #f0f4ff; }
  .chan.active { background: #e8efff; border-left: 3px solid var(--accent); }
  .chan-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .icon { background: #fff; border: 1px solid var(--line); border-radius: 5px; cursor: pointer; font-size: .72rem; color: #555; padding: .15rem .45rem; }
  .icon:hover { color: var(--accent); border-color: var(--accent); }
  #logo { height: 26px; width: 26px; object-fit: contain; }
  /* main */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #main.drag { outline: 3px dashed var(--accent); outline-offset: -6px; }
  #composer { padding: .7rem .9rem; border-bottom: 1px solid var(--line); display: flex; gap: .6rem; align-items: center; flex-wrap: wrap; }
  #composer button { cursor: pointer; border: 1px solid var(--line); background: #fff; border-radius: 6px; padding: .45rem .8rem; font-size: .95rem; }
  #shareBtn { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
  #shareBtn:disabled { opacity: .55; cursor: default; }
  #preview { display: none; height: 48px; width: 48px; object-fit: cover; border-radius: 6px; border: 1px solid var(--line); }
  #caption { flex: 1; min-width: 140px; padding: .45rem; font-size: .95rem; border: 1px solid var(--line); border-radius: 6px; }
  #composerHint { color: #999; font-size: .82rem; }
  /* feed */
  /* block stacking (NOT flex) so cards keep full natural height — a flex column
     shrinks items and the card's overflow:hidden then clips the image. */
  #feed { overflow-y: auto; flex: 1; padding: 1rem; }
  .card { width: 100%; max-width: 520px; margin: 0 auto 1rem; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .card img { width: 100%; height: auto; display: block; }
  .card .cap { padding: .6rem .8rem; font-size: .95rem; border-top: 1px solid var(--line); background: #fafafa; }
  .empty { color: #999; margin: 2rem auto; text-align: center; max-width: 360px; }
  #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 5; }
  #overlay.show { display: block; }
  #qrModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 10; align-items: center; justify-content: center; }
  #qrModal.show { display: flex; }
  .qr-box { background: #fff; border-radius: 12px; padding: 1.2rem 1.4rem; max-width: 90vw; display: flex; flex-direction: column; gap: .7rem; align-items: center; }
  #qrTitle { font-weight: 600; }
  #qrImg { width: 260px; height: 260px; max-width: 72vw; max-height: 72vw; }
  #qrUrl { font-size: .72rem; color: #06c; word-break: break-all; max-width: 280px; text-align: center; }
  #qrClose { cursor: pointer; border: 1px solid var(--line); background: #fff; border-radius: 6px; padding: .45rem 1.1rem; }
  @media (max-width: 760px) {
    #menuBtn { display: inline-block; }
    #sidebar { position: fixed; z-index: 6; top: 0; bottom: 0; left: 0; transform: translateX(-100%); transition: transform .2s; box-shadow: 2px 0 12px rgba(0,0,0,.15); }
    #sidebar.open { transform: translateX(0); }
  }
</style>
</head>
<body>
  <header>
    <button id="menuBtn" aria-label="channels">☰</button>
    <img id="logo" src="axona-ant.png" alt="Axona">
    <h1>Axona-share</h1>
    <span>·</span><span id="activeName"></span>
    <span id="status"></span>
    <span id="ver"></span>
  </header>

  <div class="wrap">
    <aside id="sidebar">
      <div class="side-head"><span>Channels</span><button id="addChannel" title="Create or join a channel">+ New</button></div>
      <div id="channels"></div>
    </aside>

    <section id="main">
      <div id="composer">
        <img id="preview" alt="preview">
        <button id="pickBtn">Choose image</button>
        <button id="camBtn">Take photo</button>
        <input id="caption" placeholder="Add a caption…">
        <button id="shareBtn" disabled>Share image</button>
        <span id="composerHint"></span>
        <input id="fileInput" type="file" accept="image/*" hidden>
        <input id="camInput" type="file" accept="image/*" capture="environment" hidden>
      </div>
      <div id="feed"></div>
    </section>
  </div>

  <div id="overlay"></div>

  <div id="qrModal">
    <div class="qr-box">
      <div id="qrTitle"></div>
      <img id="qrImg" alt="channel QR code">
      <a id="qrUrl" target="_blank" rel="noopener"></a>
      <button id="qrClose">Close</button>
    </div>
  </div>

  <!-- Bare-specifier resolution: the published kernel is symlinked at
       ./axona-protocol (→ node_modules/@axona/protocol). std/chunk is the
       reliable file-chunking helper; @axona/web is the browser transport.
       The ?v= query is CACHE-BUSTING: GitHub Pages serves these modules with
       a 10-min max-age, so without a version stamp a browser can keep running
       a STALE module after a deploy (e.g. an old std/chunk that targeted a
       larger chunk size, which then trips the kernel's 15 KB publish guard —
       the "88 KB enveloped message" failure). Bump APP_VERSION on every release
       so each deploy serves fresh module URLs. std/chunk is self-contained (no
       sub-imports), so versioning its entry fully refreshes it. -->
  <script type="importmap">
  {
    "imports": {
      "@axona/protocol": "./axona-protocol/src/index.js?v=0.14.0",
      "@axona/protocol/std": "./axona-protocol/std/index.js?v=0.14.0",
      "@axona/protocol/std/chunk": "./axona-protocol/std/chunk.js?v=0.14.0",
      "@axona/web": "./axona-protocol/src/transport/web/index.js?v=0.14.0"
    }
  }
  </script>
  <script type="module" src="./app.js?v=0.14.0"></script>
</body>
</html>
